        responseStatus: 200
        responseBody: |
          { "success": true, "data": { "parcelCode": "UC-13-13", "trackingNo": null, "orderCode": "ORD-260508-007", "to": { "name": "Delhi Fabrics Ltd.", "phone": "9123456780", "address": "45, Karol Bagh", "city": "New Delhi", "state": "Delhi", "pincode": "110005" }, "from": { "name": "vaishnavi", "phone": "1234567891", "address": "IT Park, Sector 60", "city": "Noida", "state": "Uttar Pradesh", "pincode": "201301" }, "items": [{ "name": "Utsav Mogra Pom Pom bell strings", "colorName": "Majenta", "qty": 6 }] } }

      - name: Get Timeline
        method: GET
        path: /parcels/:id/timeline
