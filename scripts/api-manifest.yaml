# ============================================================================
# SDCMS Backend — API Manifest (Source of Truth for Doc Generation)
# Run: node scripts/generate-api-docs.js
# ============================================================================
info:
  title: SDCMS Backend API
  version: "1.1.0"
  baseUrl: "{{base_url}}"

collections:
  # ========== 1. AUTHENTICATION ==========
  - name: Authentication
    slug: authentication
    description: Auth endpoints for login and user profile
    guide: "To authenticate, use the Login endpoint to receive a JWT token. This token must be included in the 'Authorization' header as 'Bearer <token>' for all protected routes. Frontend devs should store this in localStorage or a secure cookie."
    endpoints:
      - name: Login
        method: POST
        path: /auth/login
        auth: none
        roles: [ALL]
        description: Authenticates a user and provides a JWT token.
        notes: "If the login is successful, you'll receive an object containing the user's profile and the token. If the account is locked (allowLogin: false), you will get a 403 error."
        headers: { Content-Type: application/json }
        body: |
          { "email": "admin@example.com", "password": "securePass123" }
        responseStatus: 200
        responseBody: |
          { "success": true, "data": { "id": "EMP-001", "employeeCode": "EMP-001", "username": "admin", "name": "Admin User", "email": "admin@example.com", "role": "ADMIN", "token": "eyJhbG..." } }
        assertions:
          - "res.status equals 200"
          - "res.body.success is true"
          - "Store res.body.data.token as {{authToken}}"

      - name: Get Profile
        method: GET
        path: /auth/profile
        roles: [ALL]
        description: Retrieves the authenticated user's profile and permissions.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": { "employeeCode": "EMP-001", "username": "admin", "firstName": "Admin User", "email": "admin@example.com", "phoneNo": "9876543210", "roleCode": "ADMIN", "allowLogin": true, "createdAt": "2026-04-20T10:00:00Z" } }
        assertions:
          - "res.status equals 200"
          - "res.body.success is true"
          - "res.body.data contains employeeCode, roleCode"

      - name: System Health
        method: GET
        path: /system/health
        auth: none
        roles: [ALL]
        description: Checks database connectivity and system status.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": { "status": "UP", "dbConnected": true } }
        assertions:
          - "res.status equals 200"
          - "res.body.data.status equals UP"

  # ========== 2. PRODUCT CATALOG ==========
  - name: Product Catalog
    slug: product-catalog
    description: Product CRUD with inline variations, lookup CRUD (categories, colors, units), and dropdown endpoints
    guide: "The product form has two sections: (1) Product details — name, category, unit; (2) Variations table — each row has color, size, rate. Categories, colors, and units can be created on the fly from dropdowns. Create/Update Product accepts an optional 'variations' array for atomic product + variation management."
    endpoints:
      # --- Lookup Endpoints ---
      - name: Get Categories
        method: GET
        path: /products/categories
        roles: [ADMIN, OPERATOR]
        description: Retrieves all active product categories for dropdown.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "id": 1, "categoryName": "Textiles" }, { "id": 2, "categoryName": "Accessories" }] }
        assertions:
          - "res.status equals 200"
          - "res.body.data is Array"

      - name: Create Category
        method: POST
        path: /products/categories
        roles: [ADMIN, OPERATOR]
        description: Creates a new product category (used when user selects 'Create New' in the dropdown).
        headers: { Content-Type: application/json }
        body: |
          { "categoryName": "Electronics" }
        responseStatus: 201
        responseBody: |
          { "success": true, "data": { "id": 3, "categoryName": "Electronics" } }
        assertions:
          - "res.status equals 201"
          - "res.body.data.categoryName equals Electronics"

      - name: Get Units
        method: GET
        path: /products/units
        roles: [ADMIN, OPERATOR]
        description: Retrieves all active units for dropdown.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "id": 1, "unitTitle": "Kilogram", "unitCode": "KG" }] }
        assertions:
          - "res.status equals 200"
          - "res.body.data is Array"

      - name: Create Unit
        method: POST
        path: /products/units
        roles: [ADMIN, OPERATOR]
        description: Creates a new unit lookup entry (used when user selects 'Create New' in the dropdown).
        headers: { Content-Type: application/json }
        body: |
          { "unitTitle": "Meter", "unitCode": "MTR" }
        responseStatus: 201
        responseBody: |
          { "success": true, "data": { "id": 4, "unitTitle": "Meter", "unitCode": "MTR" } }
        assertions:
          - "res.status equals 201"
          - "res.body.data.unitCode equals MTR"

      - name: Get Colors
        method: GET
        path: /products/colors
        roles: [ADMIN, OPERATOR]
        description: Retrieves all active color lookup entries for dropdown.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "id": 1, "colorName": "Red", "colorCode": "RED" }] }
        assertions:
          - "res.status equals 200"
          - "res.body.data is Array"

      - name: Create Color
        method: POST
        path: /products/colors
        roles: [ADMIN, OPERATOR]
        description: Creates a new color lookup entry (used when user selects 'Create New' in the dropdown).
        headers: { Content-Type: application/json }
        body: |
          { "colorName": "Crimson", "colorCode": "CRM" }
        responseStatus: 201
        responseBody: |
          { "success": true, "data": { "id": 4, "colorName": "Crimson", "colorCode": "CRM" } }
        notes: "colorCode is optional and defaults to an empty string if not provided."
        assertions:
          - "res.status equals 201"
          - "res.body.data.colorName equals Crimson"

      # --- Product CRUD ---
      - name: List Products
        method: GET
        path: /products
        roles: [ADMIN, OPERATOR]
        description: Retrieves products filtered by categoryId or unitId, paginated.
        parameters:
          page: { type: 'number', description: 'Page number (default: 1)' }
          limit: { type: 'number', description: 'Items per page (default: 20)' }
          categoryId: { type: 'number', description: 'Filter by category primary key (0 = no filter)' }
          unitId: { type: 'number', description: 'Filter by unit primary key (0 = no filter)' }
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "productId": 1, "variationId": 1, "materialName": "Cotton Roll", "materialRate": 500, "categoryName": "Textiles", "colorId": 1, "colorName": "Red", "size": "M", "isActive": true }] }
        notes: "Each list item now includes variationId (PkProductColorId) and the full color/size matrix fields so the frontend can target specific variations without a secondary lookup."
        assertions:
          - "res.status equals 200"
          - "res.body.data is Array"
          - "each item has variationId"

      - name: Create Product
        method: POST
        path: /products
        roles: [ADMIN, OPERATOR]
        description: Creates a new product with a single inline variation (color + size). categoryId, colorId, and size are required at the top level — no nested variations array.
        headers: { Content-Type: application/json }
        body: |
          { "materialName": "Cotton Roll", "categoryId": 1, "colorId": 1, "size": "M", "materialRate": 500 }
        responseStatus: 201
        responseBody: |
          { "success": true, "data": { "id": 2, "materialName": "Cotton Roll", "materialRate": 500, "categoryId": 1, "variations": [{ "variationId": 1, "colorId": 1, "size": "M", "materialRate": 500 }] } }
        notes: "categoryId, colorId, and size are required. materialRate is optional (defaults to 0). unitId is not accepted on create. If a product with the same name already exists, the new variation is auto-linked to that existing product instead of creating a duplicate."
        assertions:
          - "res.status equals 201"
          - "res.body.success is true"
          - "res.body.data.variations is Array"

      - name: Get Product by ID
        method: GET
        path: /products/:id
        roles: [ADMIN, OPERATOR]
        description: Retrieves a single product by its primary key, including all active variations.
        parameters:
          id: { type: 'number', description: 'Unique identifier of the product' }
        responseStatus: 200
        responseBody: |
          { "success": true, "data": { "id": 1, "materialName": "Cotton Roll", "materialRate": 500, "categoryId": 1, "unitId": 1, "variations": [{ "variationId": 1, "colorId": 1, "colorName": "Red", "size": "M", "materialRate": 550 }] } }

      - name: Update Product
        method: PUT
        path: /products/:id
        roles: [ADMIN, OPERATOR]
        description: "Updates product fields and/or manages variations. Supports three body shapes — see notes for scoped response shapes per mode."
        headers: { Content-Type: application/json }
        body: |
          { "materialRate": 560, "colorId": 1, "size": "M" }
        responseStatus: 200
        notes: |
          Three body shapes accepted, each returning a different scoped response:

          1. Flat (colorId + size at root): Finds the matching existing variation by colorId+size and updates it.
             Returns a single variation object: { variationId, colorId, colorName, size, materialRate, isActive }.
             404 if no match — use POST /:id/variations to insert a new variation.

          2. Flat (variationId at root): Directly targets the variation by its PK and updates it.
             Returns the same single variation object.

          3. Variations array (batch diff): Accepts a 'variations' array where:
             - variationId present → UPDATE that variation
             - variationId absent → INSERT new variation
             - variationId + isActive:false → soft-delete
             Returns an array containing only the variations that were part of the request (mutated subset, not the full product).

          4. Product-level-only (no variation fields at root, no variations array):
             Updates product master fields only (e.g. materialName, categoryId, unitId).
             Returns product fields without a 'variations' key, keeping the response lean.

          Example batch body: { "variations": [{ "variationId": 1, "colorId": 1, "size": "M", "materialRate": 560 }, { "colorId": 3, "size": "S", "materialRate": 480 }, { "variationId": 2, "isActive": false }] }
        assertions:
          - "res.status equals 200"
          - "res.body.success is true"
          - "flat update returns single variation object"
          - "batch update returns only mutated variations array"

      - name: Toggle Product Status
        method: PATCH
        path: /products/:id/status
        roles: [ADMIN, OPERATOR]
        description: Activates or deactivates a product and all its variations (cascading).
        headers: { Content-Type: application/json }
        body: |
          { "isActive": false }
        responseStatus: 200

      - name: Toggle Variation Status
        method: PATCH
        path: /products/:id/variations/:variationId/status
        roles: [ADMIN, OPERATOR]
        description: Granular toggle for a specific color/size variation.
        headers: { Content-Type: application/json }
        body: |
          { "isActive": true }
        responseStatus: 200

      - name: Product Name Search (Autosuggest)
        method: GET
        path: /products/search
        roles: [ADMIN, OPERATOR]
        description: Deduplicated product name suggestions for the Product Name typeahead. Returns one entry per product (not per variation). Use when user types in the Product Name field.
        parameters:
          q: { type: 'string', description: 'Partial product name to match (case-insensitive, up to 10 results)' }
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "productId": 1, "materialName": "Cotton Roll" }] }
        assertions:
          - "res.status equals 200"
          - "res.body.data is Array"
          - "each item has productId and materialName"

      - name: Product Dropdown
        method: GET
        path: /products/dropdown
        roles: [ADMIN, OPERATOR]
        description: Combined product + category flat dropdown list for order forms. Supports partial-match search.
        parameters:
          search: { type: 'string', description: 'Partial match against product name or category (optional)' }
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "value": { "productId": 1, "variationId": 1, "materialRate": 550 }, "label": "Cotton Roll — Red / M (Textiles) [CU-001]" }] }
        assertions:
          - "res.status equals 200"
          - "res.body.data is Array"

      - name: Add/Update Product Color Matrix (Standalone)
        method: POST
        path: /products/:id/variations
        roles: [ADMIN, OPERATOR]
        description: Standalone endpoint to add or update a single color/size pricing variation. Kept as a fallback for individual variation edits outside the product form.
        headers: { Content-Type: application/json }
        body: |
          { "fkLuColorId": 1, "materialRate": 550, "size": "M" }
        responseStatus: 201
        responseBody: |
          { "success": true, "data": { "variationId": 3, "productId": 1, "colorId": 1, "materialRate": 550, "size": "M" } }
        notes: "Pass variationId in body for updates. Omit variationId for new entries. Prefer using the inline variations array on PUT /products/:id for batch operations."
        assertions:
          - "res.status equals 201"
          - "res.body.data.materialRate equals 550"

  # ========== 3. EMPLOYEE MANAGEMENT ==========
  - name: Employee Management (ADMIN)
    slug: employee-management
    description: Employee CRUD and access control (ADMIN only)
    endpoints:
      - name: List Employees
        method: GET
        path: /employees
        roles: [ADMIN]
        description: Paginated employee list with optional search and role filter.
        parameters:
          page: { type: 'number', description: 'Page number (default: 1)' }
          limit: { type: 'number', description: 'Items per page (default: 20)' }
          search: { type: 'string', description: 'Partial match against name or email' }
          role: { type: 'string', description: 'Filter by role code (ADMIN, OPERATOR, COURIER)' }
        responseStatus: 200

      - name: Create Employee
        method: POST
        path: /employees
        roles: [ADMIN]
        description: Creates a new employee account.
        headers: { Content-Type: application/json }
        body: |
          { "name": "New Emp", "role": "OPERATOR", "email": "newemp@example.com", "password": "Test123456" }
        responseStatus: 201

      - name: Get Employee by ID
        method: GET
        path: /employees/:id
        roles: [ADMIN]
        description: Retrieves a single employee by ID.
        responseStatus: 200

      - name: Update Employee
        method: PUT
        path: /employees/:id
        roles: [ADMIN]
        description: Updates employee details.
        headers: { Content-Type: application/json }
        body: |
          { "name": "Updated Name" }
        responseStatus: 200

      - name: Toggle Employee Status
        method: PATCH
        path: /employees/:id/status
        roles: [ADMIN]
        description: Soft-deletes or reactivates an employee. Deactivated employees are excluded from standard GET responses.
        headers: { Content-Type: application/json }
        body: |
          { "isActive": false }
        responseStatus: 200

      - name: Toggle Employee Access
        method: PATCH
        path: /employees/:id/toggle-access
        roles: [ADMIN]
        description: Enables or disables an employee's login access.
        headers: { Content-Type: application/json }
        body: |
          { "allowLogin": true }
        responseStatus: 200

  # ========== 4. COURIER PARTNERS ==========
  - name: Courier Partners
    slug: courier-partners
    description: Courier partner CRUD operations
    endpoints:
      - name: List Couriers
        method: GET
        path: /courier-partners
        roles: [ADMIN, OPERATOR, COURIER]
        description: Paginated courier partner list with optional search.
        parameters:
          page: { type: 'number', description: 'Page number (default: 1)' }
          limit: { type: 'number', description: 'Items per page (default: 20)' }
          search: { type: 'string', description: 'Partial match against courier name' }
        responseStatus: 200

      - name: Create Courier
        method: POST
        path: /courier-partners
        roles: [ADMIN, OPERATOR]
        description: Registers a new courier partner.
        headers: { Content-Type: application/json }
        body: |
          { "courierName": "TestCourier Express", "contactPerson": "John Doe", "phoneNo": "9876543210", "email": "courier@example.com", "trackingUrlTemplate": "https://track.testcourier.com/awb/{AWB}" }
        responseStatus: 201

      - name: Get Courier by ID
        method: GET
        path: /courier-partners/:id
        roles: [ADMIN, OPERATOR, COURIER]
        description: Retrieves a courier partner by ID.
        parameters:
          id: { type: 'number', description: 'Courier partner primary key' }
        responseStatus: 200

      - name: Update Courier
        method: PUT
        path: /courier-partners/:id
        roles: [ADMIN, OPERATOR]
        description: Updates courier partner details. All fields optional.
        headers: { Content-Type: application/json }
        body: |
          { "courierName": "Updated Courier", "phoneNo": "9876543210" }
        responseStatus: 200

      - name: Toggle Courier Status
        method: PATCH
        path: /courier-partners/:id/status
        roles: [ADMIN, OPERATOR]
        description: Activates or deactivates a courier partner (soft delete/reactivate). Deactivated couriers are excluded from standard GET responses.
        headers: { Content-Type: application/json }
        body: |
          { "isActive": false }
        responseStatus: 200
        assertions:
          - "res.status equals 200"
          - "res.body.success is true"

  # ========== 5. SENDERS ==========
  - name: Senders
    slug: senders
    description: Sender (Party) CRUD, lookup, and address book
    endpoints:
      - name: List Senders
        method: GET
        path: /senders
        roles: [ADMIN, OPERATOR]
        description: Retrieves all active sender entities.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "id": 1, "customerName": "John Doe", "phoneNo": "9876543210", "emailId": "john.doe@example.com", "isActive": true }] }

      - name: Create Sender
        method: POST
        path: /senders
        roles: [ADMIN, OPERATOR]
        description: Registers a new sender with contact and address info.
        headers: { Content-Type: application/json }
        body: |
          { "customerName": "John Doe Enterprises", "phoneNo": "9876543210", "emailId": "john.doe@example.com", "address": "123 Business Park, Sector 62", "city": "Noida", "state": "Uttar Pradesh", "pincode": "201301" }
        responseStatus: 201

      - name: Get Sender by ID
        method: GET
        path: /senders/:id
        roles: [ADMIN, OPERATOR]
        description: Retrieves a single sender profile.
        responseStatus: 200

      - name: Lookup by Phone
        method: GET
        path: /senders/lookup?phone=9876543210
        roles: [ADMIN, OPERATOR]
        description: Quick party lookup by mobile number for auto-fill (searches both senders and receivers).
        responseStatus: 200

      - name: Get All Party Names
        method: GET
        path: /senders/names
        roles: [ADMIN, OPERATOR]
        description: Distinct party names (senders and receivers) for autocomplete dropdown.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": ["John Doe Enterprises", "Ramesh Textiles"] }

      - name: Get All Party Phones
        method: GET
        path: /senders/phones
        roles: [ADMIN, OPERATOR]
        description: Distinct party phone numbers (senders and receivers) for autocomplete dropdown.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": ["9876543210", "9000000001"] }

      - name: Lookup by Name
        method: GET
        path: /senders/lookup-by-name?name=John
        roles: [ADMIN, OPERATOR]
        description: Search parties by partial name match (searches both senders and receivers).
        responseStatus: 200

      - name: Update Sender
        method: PUT
        path: /senders/:id
        roles: [ADMIN, OPERATOR]
        description: Updates sender information (partial updates supported).
        headers: { Content-Type: application/json }
        body: |
          { "customerName": "John Doe Enterprises Updated", "city": "Gurugram", "state": "Haryana" }
        responseStatus: 200

      - name: Delete Sender
        method: DELETE
        path: /senders/:id
        roles: [ADMIN, OPERATOR]
        description: Soft-deletes a sender.
        responseStatus: 200

      - name: Get Addresses
        method: GET
        path: /senders/:id/addresses
        roles: [ADMIN, OPERATOR]
        description: Address book entries for a sender (dropdown).
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "id": 10, "partyId": 1, "partyName": "John Doe Enterprises", "phoneNo": "9876543210", "address": "123 Business Park", "city": "Noida", "state": "UP", "pincode": "201301", "isDefault": true }] }

      - name: Create Address
        method: POST
        path: /senders/:id/addresses
        roles: [ADMIN, OPERATOR]
        description: Adds a new address to a sender's address book.
        headers: { Content-Type: application/json }
        body: |
          { "address": "456 New Location", "city": "Mumbai", "state": "Maharashtra", "pincode": "400001" }
        responseStatus: 201

  # ========== 6. RECEIVERS ==========
  - name: Receivers
    slug: receivers
    description: Receiver (Party) CRUD, lookup, and address book
    guide: "Receivers mirror the Sender module. Full CRUD is supported with phone/email uniqueness checks. Each receiver can have multiple shipping addresses via the address book sub-resource."
    endpoints:
      - name: List Receivers
        method: GET
        path: /receivers
        roles: [ADMIN, OPERATOR]
        description: Retrieves all active receiver entities.
        responseStatus: 200

      - name: Create Receiver
        method: POST
        path: /receivers
        roles: [ADMIN, OPERATOR]
        description: Registers a new receiver with contact and address info.
        headers: { Content-Type: application/json }
        body: |
          { "customerName": "Delhi Fabrics Ltd.", "phoneNo": "9123456780", "emailId": "delhi@fabrics.com", "address": "45, Karol Bagh", "city": "New Delhi", "state": "Delhi", "pincode": "110005" }
        responseStatus: 201

      - name: Get Receiver by ID
        method: GET
        path: /receivers/:id
        roles: [ADMIN, OPERATOR]
        description: Retrieves a single receiver profile.
        responseStatus: 200

      - name: Lookup by Phone
        method: GET
        path: /receivers/lookup?phone=9123456780
        roles: [ADMIN, OPERATOR]
        description: Quick party lookup by mobile number for auto-fill (searches both senders and receivers).
        responseStatus: 200

      - name: Get All Party Names
        method: GET
        path: /receivers/names
        roles: [ADMIN, OPERATOR]
        description: Distinct party names (senders and receivers) for autocomplete dropdown.
        responseStatus: 200

      - name: Get All Party Phones
        method: GET
        path: /receivers/phones
        roles: [ADMIN, OPERATOR]
        description: Distinct party phone numbers (senders and receivers) for autocomplete.
        responseStatus: 200

      - name: Lookup by Name
        method: GET
        path: /receivers/lookup-by-name?name=Receiver
        roles: [ADMIN, OPERATOR]
        description: Search parties by partial name match (searches both senders and receivers).
        responseStatus: 200

      - name: Update Receiver
        method: PUT
        path: /receivers/:id
        roles: [ADMIN, OPERATOR]
        description: Updates receiver information (partial updates supported).
        headers: { Content-Type: application/json }
        body: |
          { "customerName": "Delhi Fabrics Updated", "city": "Gurugram" }
        responseStatus: 200

      - name: Delete Receiver
        method: DELETE
        path: /receivers/:id
        roles: [ADMIN, OPERATOR]
        description: Soft-deletes a receiver.
        responseStatus: 200

      - name: Get Addresses
        method: GET
        path: /receivers/:id/addresses
        roles: [ADMIN, OPERATOR]
        description: Address book entries for a receiver (dropdown).
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "id": 10, "partyId": 2, "partyName": "Delhi Fabrics Ltd.", "phoneNo": "9123456780", "address": "45, Karol Bagh", "city": "New Delhi", "state": "Delhi", "pincode": "110005", "isDefault": true }] }

      - name: Create Address
        method: POST
        path: /receivers/:id/addresses
        roles: [ADMIN, OPERATOR]
        description: Adds a new address to a receiver's address book.
        headers: { Content-Type: application/json }
        body: |
          { "address": "789 New Location", "city": "Kolkata", "state": "West Bengal", "pincode": "700001" }
        responseStatus: 201

  # ========== 7. ORDER PIPELINE ==========
  - name: Order Pipeline
    slug: order-pipeline
    description: Order CRUD with Mode A/B/C support
    guide: "Our system uses 3 creation modes: Mode A (Sender-to-Self), Mode B (Sender-to-Receivers), and Mode C (Combo). The backend automatically detects the mode based on whether 'products' (root) or 'receivers' (array) are provided. Testers should verify that each receiver correctly generates its own unique dynamic Parcel ID (PCL-<orderId>-<parcelDetailsId>)."
    endpoints:
      - name: List Orders
        method: GET
        path: /orders?page=1&limit=20
        roles: [ADMIN, OPERATOR, COURIER]
        description: Paginated order list with derived status.
        parameters:
          page: { type: 'number', description: 'Page number (default: 1)' }
          limit: { type: 'number', description: 'Items per page (default: 20)' }
          search: { type: 'string', description: 'Partial match against order code or sender name' }
          status: { type: 'string', description: 'Filter by derived status (PENDING, DISPATCHED, DELIVERED, CANCELLED)' }
          parcelStatus: { type: 'string', description: 'Filter orders that contain at least one parcel with this status. Allowed: Pending, Label Printed, AWB Linked, Dispatched, Delivered, Cancelled. Case-insensitive.' }
          sortBy: { type: 'string', description: 'Field to sort by (default: created_at)' }
          sortOrder: { type: 'string', description: 'Sort direction: asc or desc (default: desc)' }
        responseStatus: 200
        responseBody: |
          { "success": true, "data": [{ "id": 1, "orderCode": "ORD-2026-001", "senderName": "Ramesh Textiles", "senderMobile": "9876543210", "totalAmount": 2100.00, "derivedStatus": "PENDING", "createdAt": "2026-04-24T10:00:00Z" }], "meta": { "page": 1, "limit": 20, "totalRows": 1, "totalPages": 1 } }

      - name: "Create Order — Mode B (Sender → Receivers)"
        method: POST
        path: /orders
        roles: [ADMIN, OPERATOR]
        description: Creates an order with sender and multiple receivers. Each receiver generates a parcel.
        notes: "This is Mode B. Ensure each object in the 'receivers' array has its own 'products' array. The 'courierId' is mandatory to determine the shipping partner."
        headers: { Content-Type: application/json }
        body: |
          { "senderId": 1, "senderAddressId": 1, "courierId": 1, "receivers": [{ "receiverId": 2, "receiverAddressId": 2, "products": [{ "variationId": 1, "quantity": 5 }] }] }
        responseStatus: 201
        assertions:
          - "res.status equals 201"
          - "Each receiver has a nested parcel with parcelId starting with PCL-"
          - "Parcel status is PENDING"
          - "Mode B detected: multiple receivers created"

      - name: "Create Order — Mode A (Sender-to-Self)"
        method: POST
        path: /orders
        roles: [ADMIN, OPERATOR]
        description: Sender-to-self order using top-level products array.
        headers: { Content-Type: application/json }
        body: |
          { "senderId": 1, "senderAddressId": 1, "courierId": 1, "products": [{ "variationId": 1, "quantity": 10 }] }
        responseStatus: 201

      - name: Get Order Aggregate
        method: GET
        path: /orders/:id
        roles: [ADMIN, OPERATOR, COURIER]
        description: Full order with nested receivers, items, and parcels.
        responseStatus: 200
        responseBody: |
          { "success": true, "data": { "id": 1, "orderCode": "ORD-2026-001", "senderName": "Ramesh Textiles", "senderMobile": "9876543210", "totalAmount": 2100.00, "derivedStatus": "PENDING", "senderAddress": "14, Gandhi Nagar, Surat", "courierId": 1, "receivers": [{ "id": 1, "receiverName": "Delhi Fabrics Ltd.", "receiverPhone": "9123456780", "address": "45, Karol Bagh", "city": "New Delhi", "state": "Delhi", "pincode": "110005", "parcel": { "parcelDetailsId": 1, "parcelId": "PCL-1-1", "status": "PENDING" }, "products": [{ "productId": 1, "qty": 5, "unitPrice": 420.00 }] }] } }

      - name: Update Order (Full Graph)
        method: PUT
        path: /orders/:id
        roles: [ADMIN, OPERATOR]
        description: "Atomic full-graph update. Accepts sender, receivers, and products. Blocked if any parcel >= AWB_LINKED. Removed receivers are soft-deleted and their parcels cancelled."
        notes: "Uses a diff-based strategy: receivers with receiverDetailsId are updated, without it are added, any existing receivers missing from the payload are soft-deleted. Products follow the same pattern with orderItemId."
        useCases: |
          Imagine the frontend has fetched the order and the user is on the Order Details edit page. When the user clicks "Save Changes", the frontend sends a single PUT request with the final state of the order.

          Here is how specific actions translate into the JSON payload:

          1. Editing the Sender:
          Action: The user selects a different sender or a different address for the sender.
          Payload: You pass the new senderId and senderAddressId at the root level. The backend automatically fetches the fresh name, phone, and address from the Party Master and updates the order snapshot.

          2. Editing a Receiver (Parcel Destination):
          Action: The user changes the delivery address for an existing parcel.
          Payload: You include the existing receiverDetailsId, but change the receiverAddressId to the new selection.
          ```json
          {
            "receiverDetailsId": 105, // Tells backend: "Update this existing receiver"
            "receiverId": 4,
            "receiverAddressId": 12 // Changed to a new address ID
          }
          ```

          3. Adding/Removing/Editing Products:
          Edit Quantity: Pass the product with its existing orderItemId and the new quantity.
          Add Product: Pass the new product without an orderItemId. The backend sees no ID and creates it.
          Remove Product: Simply omit the product from the array. The backend sees it's missing compared to the database and soft-deletes it.
          ```json
          {
            "products": [
              { "orderItemId": 50, "variationId": 1, "quantity": 10 }, // UPDATE qty to 10
              { "variationId": 2, "quantity": 5 } // INSERT new product (No orderItemId)
              // Omitted orderItemId 51 -> Backend will DELETE it
            ]
          }
          ```

          4. Deleting a Parcel:
          Action: The user clicks the "Trash" icon on a parcel/receiver card.
          Payload: The frontend simply removes that receiver object from the receivers array before sending the payload.
          Backend Response: The diff engine notices the receiverDetailsId is missing, so it soft-deletes the receiver, soft-deletes all attached items, and automatically sets the Parcel Status to CANCELLED (Trigger 5).

          Evaluation: Is the Diff Strategy Suitable?
          Yes, it is highly suitable and represents the industry standard for complex form edits.
          If we didn't use a diff strategy, the frontend would have to make 5 different API calls when the user clicks "Save" (e.g., DELETE /items/3, POST /items, PUT /receivers/2, PATCH /orders/1).

          Why this is great for your UI:
          - Dumb Frontend, Smart Backend: The React/Vue frontend doesn't need to track a list of "deleted items" or "new items". It just maintains a single state object. Whatever the state object looks like when the user clicks "Save" is exactly what is sent to the backend.
          - Atomicity: Because the backend calculates the diffs and wraps them in a single SQL Transaction, if anything fails (e.g., a product variation doesn't exist), the entire update rolls back. You never end up with a half-updated order.
          - Automatic Cleanup: Deleting a receiver automatically cleans up the items and cancels the parcel without the frontend needing to explicitly request a parcel cancellation.

          ⚠️ Caveats to Keep in Mind for the UI:
          There are two important constraints this API enforces that the UI must respect:

          Strict ID Resolution (No Free-Text):
          Currently, the API contract strictly requires senderId, receiverId, and addressId. It pulls the text (Names, Phones, Addresses) directly from the Party Master.
          If your UI allows users to arbitrarily type a new name or phone number into a text box just for this specific order, the current API will ignore it. To change a phone number, the user must update the Party Master first, or the API needs to be relaxed to accept raw string overrides.

          The "All-or-Nothing" Threshold:
          If any parcel in the order has reached AWB_LINKED or DISPATCHED, the API will block the entire update with a 400 Bad Request. The UI should check the parcel statuses on load, and if physical execution has started, the "Edit Order" button should be disabled with a tooltip explaining why.

          Full Array Required:
          If an order has 3 receivers and the user only wants to edit 1, the frontend must send all 3 receivers in the payload. If it only sends 1, the diff strategy will assume the user deleted the other 2.
        headers: { Content-Type: application/json }
        body: |
          { "senderId": 2, "senderAddressId": 2, "receivers": [{ "receiverDetailsId": 1, "receiverId": 1, "receiverAddressId": 1, "products": [{ "orderItemId": 1, "variationId": 1, "quantity": 5 }, { "variationId": 2, "quantity": 10 }] }, { "receiverId": 2, "receiverAddressId": 2, "products": [{ "variationId": 1, "quantity": 1 }] }] }
        responseStatus: 200

      - name: Cancel Order
        method: DELETE
        path: /orders/:id/cancel
        roles: [ADMIN, OPERATOR]
        description: Cancels order and all non-dispatched parcels.
        responseStatus: 200

