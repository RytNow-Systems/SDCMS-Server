    endpoints:
      - name: Log Print
        method: POST
        path: /parcels/:id/log-print
        roles: [ADMIN, OPERATOR]
        description: Transitions parcel from PENDING to LABEL_PRINTED.
        responseStatus: 200
        assertions:
          - "res.body.data.status equals LABEL_PRINTED"

  # ========== 10. TWO SCAN OPERATIONS ==========
  - name: Two Scan Operations
    slug: scan-operations
    description: Atomic QR + AWB scanning flow
    endpoints:
      - name: Scan and Link AWB
        method: POST
        path: /parcels/scan
        roles: [ADMIN, OPERATOR, COURIER]
        description: "Parcel ID identifies parcel, AWB links shipment. OPERATOR → AWB_LINKED, COURIER → auto-DISPATCHED."
        notes: "This is an atomic operation. The parcelId (dynamic PCL-<orderId>-<parcelDetailsId> format) identifies the parcel from the scanned QR code. If a user with the COURIER role performs this scan, the parcel is automatically moved to the DISPATCHED state, skipping the manual dispatch step."
        headers: { Content-Type: application/json }
        body: |
          { "parcelId": "PCL-1-1", "awbNumber": "AWB-DTDC-001" }
        responseStatus: 200
        assertions:
          - "OPERATOR scan → status AWB_LINKED"
          - "COURIER scan → status DISPATCHED (auto-dispatch)"

  # ========== 11. DISPATCH AND TERMINAL STATES ==========
  - name: Dispatch and Terminal States
    slug: dispatch-terminal
    description: Dispatch, deliver, and return parcel operations
    endpoints:
      - name: Batch Dispatch
        method: POST
        path: /parcels/dispatch
        roles: [ADMIN, OPERATOR]
        description: Dispatches one or more AWB_LINKED parcels.
        headers: { Content-Type: application/json }
        body: |
          { "parcelDetailsIds": [1, 2, 3] }
        responseStatus: 200

      - name: Mark Delivered
        method: PATCH
        path: /parcels/:id/deliver
        roles: [ADMIN, OPERATOR]
        description: Terminal state — marks parcel as DELIVERED.
        responseStatus: 200

      - name: Cancel Parcel
        method: PATCH
        path: /parcels/:id/cancel
        roles: [ADMIN, OPERATOR]
        description: Terminal state — cancels a parcel.
        responseStatus: 200


